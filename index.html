<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>แบบสำรวจการบริหารจัดการแปลงอ้อย</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background:#f4f6f8; }
    .container { max-width: 900px; margin: auto; background:white; padding:20px; border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,0.1);}    
    h1, h2 { color:#2c7a2c; }
    label { display:block; margin-top:10px; font-weight:600; }
    input, select, textarea { width:100%; padding:8px; margin-top:5px; border-radius:6px; border:1px solid #ccc; }
    .inline { display:inline-block; width:auto; margin-right:10px; }
    .section { margin-top:25px; padding-top:15px; border-top:2px solid #eaeaea; }
    button { margin-top:20px; padding:12px; background:#2c7a2c; color:white; border:none; border-radius:8px; font-size:16px; cursor:pointer; }
    button:hover { background:#256b25; }
  </style>
</head>
<body>
  <div class="container">
    <h1>แบบสำรวจการบริหารจัดการแปลงอ้อย</h1>
    <p>สำหรับพื้นที่ที่ได้รับผลกระทบจากโรคใบขาวอ้อย</p>

    <form>
      <div class="section">
        <h2>ส่วนที่ 1: ข้อมูลทั่วไป</h2>
        <label>ชื่อ - สกุล</label>
        <input type="text" name="name">

        <label>ที่อยู่</label>
        <textarea name="address"></textarea>

        <label>เบอร์โทรศัพท์</label>
        <input type="tel" name="phone">

        <label>การขึ้นทะเบียนชาวไร่อ้อย</label>
        <label class="inline"><input type="radio" name="register" value="no"> ไม่ขึ้นทะเบียน</label>
        <label class="inline"><input type="radio" name="register" value="yes"> ขึ้นทะเบียน</label>

        <label>เป็นคู่สัญญากับโรงงานน้ำตาล</label>
        <label class="inline"><input type="radio" name="contract" value="no"> ไม่เป็น</label>
        <label class="inline"><input type="radio" name="contract" value="yes"> เป็น</label>
      </div>

      <div class="section">
        <h2>ส่วนที่ 2: ข้อมูลพื้นที่ปลูกอ้อย</h2>
        <label>พิกัดแปลง (GPS)</label>
        <input type="text" name="latitude" id="latitude" placeholder="Latitude" readonly>
        <input type="text" name="longitude" id="longitude" placeholder="Longitude" readonly>
        <button type="button" onclick="getLocation()">📍 บันทึกพิกัดอัตโนมัติ</button>
        <label>พื้นที่ปลูกอ้อยรวม (ไร่)</label>
        <input type="number" name="area">

        <label>พันธุ์อ้อยที่ปลูกหลัก</label>
        <input type="text" name="variety" placeholder="เช่น ขอนแก่น 3">

        <label>ผลผลิตต่อไร่ (ตัน/ไร่)</label>
        <input type="number" step="0.01" name="yield">
      </div>

      <div class="section">
        <h2>ส่วนที่ 3: ความรู้เกี่ยวกับโรคใบขาวอ้อย</h2>
        <label>ทราบว่าโรคเกิดจากเชื้อไฟโตพลาสมาหรือไม่</label>
        <label class="inline"><input type="radio" name="knowledge1" value="yes"> ทราบ</label>
        <label class="inline"><input type="radio" name="knowledge1" value="no"> ไม่ทราบ</label>

        <label>อาการที่พบ</label>
        <label><input type="checkbox" name="symptom[]" value="white"> ใบสีขาวทั้งใบ</label>
        <label><input type="checkbox" name="symptom[]" value="stripe"> ใบขาวเป็นแถบ</label>
        <label><input type="checkbox" name="symptom[]" value="small"> ลำเล็ก แตกกอ</label>
        <label><input type="checkbox" name="symptom[]" value="dead"> ตายยกกอ</label>
      </div>

      <div class="section">
        <h2>ส่วนที่ 4: การจัดการโรค</h2>
        <label>เมื่อพบโรคท่านจัดการอย่างไร</label>
        <label><input type="checkbox" name="manage[]" value="destroy"> ถอนทำลายทันที</label>
        <label><input type="checkbox" name="manage[]" value="harvest"> ปล่อยจนเก็บเกี่ยว</label>
        <label><input type="checkbox" name="manage[]" value="partial"> ตัดทิ้งบางส่วน</label>

        <label>มีการกำจัดเพลี้ยจักจั่นหรือไม่</label>
        <label class="inline"><input type="radio" name="insect" value="yes"> มี</label>
        <label class="inline"><input type="radio" name="insect" value="no"> ไม่มี</label>
      </div>

      <div class="section">
        <h2>ส่วนที่ 5: ความต้องการความช่วยเหลือ</h2>
        <label>ต้องการสนับสนุนด้านใด</label>
        <label><input type="checkbox" name="support[]" value="seed"> พันธุ์อ้อยสะอาด</label>
        <label><input type="checkbox" name="support[]" value="destroy"> วิธีทำลายต้นเป็นโรค</label>
        <label><input type="checkbox" name="support[]" value="care"> วิธีบำรุงรักษาแปลง</label>

        <label>ข้อเสนอแนะเพิ่มเติม</label>
        <textarea name="suggestion"></textarea>
      </div>

      <button type="submit">ส่งแบบสำรวจ</button>
    </form>

<script>
// ส่งข้อมูลไปบันทึกฐานข้อมูล
const form = document.querySelector('form');
form.addEventListener('submit', async (e) => {
  e.preventDefault();

  const formData = new FormData(form);
  const data = Object.fromEntries(formData.entries());

  try {
    const res = await fetch('/api/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });

    const result = await res.json();
    alert(result.message);
    form.reset();
  } catch (err) {
    alert('เกิดข้อผิดพลาดในการบันทึกข้อมูล');
  }
});


// ===== GPS LOCATION =====
function getLocation() {
  if (!navigator.geolocation) {
    alert("อุปกรณ์ไม่รองรับ GPS");
    return;
  }

  navigator.geolocation.getCurrentPosition(
    (position) => {
      document.getElementById("latitude").value = position.coords.latitude;
      document.getElementById("longitude").value = position.coords.longitude;
      alert("บันทึกพิกัดเรียบร้อย ✓");
    },
    () => {
      alert("ไม่สามารถดึงตำแหน่งได้ กรุณาอนุญาตการเข้าถึงตำแหน่ง");
    }
  );
}

</script>
  </div>
</body>
</html>
