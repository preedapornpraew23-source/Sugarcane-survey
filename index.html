<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>แบบสำรวจแปลงอ้อย</title>

<style>

body{
font-family: "Prompt", sans-serif;
background:#f4f6f4;
margin:0;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
color:#2e7d32;
}

.section{
margin-top:30px;
border-top:1px solid #ddd;
padding-top:20px;
}

label{
font-weight:500;
}

input,textarea{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:6px;
}

button{
padding:12px 18px;
border:none;
border-radius:8px;
background:#2e7d32;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1b5e20;
}

.gps{
background:#388e3c;
}

</style>

</head>

<body>

<div class="container">

<h1>🌾 แบบสำรวจการบริหารจัดการแปลงอ้อย</h1>

<div class="section">

<h2>ส่วนที่ 1 : ข้อมูลทั่วไป</h2>

<label>ชื่อ - สกุล</label>
<input id="name">

<label>ที่อยู่</label>
<textarea id="address"></textarea>

<label>เบอร์โทรศัพท์</label>
<input id="phone">

</div>

<div class="section">

<h2>ส่วนที่ 2 : ข้อมูลพื้นที่ปลูกอ้อย</h2>

<label>Latitude</label>
<input id="lat">

<label>Longitude</label>
<input id="lon">

<button class="gps" onclick="getLocation()">📍 บันทึกพิกัดอัตโนมัติ</button>
<br><br>
<label>พื้นที่ปลูกอ้อย (ไร่)</label>
<input id="area">

<label>พันธุ์อ้อย</label>
<input id="cane">

<label>ผลผลิตต่อไร่</label>
<input id="yield">

</div>

<div class="section">

<h2>ส่วนที่ 3 : อาการโรค</h2>

<label><input type="checkbox" value="leaf_white"> ใบขาวทั้งใบ</label><br>

<label><input type="checkbox" value="stripe"> ใบขาวเป็นแถบ</label><br>

<label><input type="checkbox" value="bushy"> ลำเล็ก แตกกอ</label><br>

<label><input type="checkbox" value="dead"> ตายยกกอ</label>

</div>

<div class="section">

<h2>ส่วนที่ 5 : ข้อเสนอแนะ</h2>

<textarea id="suggest"></textarea>

</div>

<button onclick="saveData()">💾 บันทึกข้อมูล</button>

</div>

<script>

function getLocation(){

navigator.geolocation.getCurrentPosition(function(position){

document.getElementById("lat").value = position.coords.latitude
document.getElementById("lon").value = position.coords.longitude

})

}

function saveData(){

let data = {

name: document.getElementById("name").value,
phone: document.getElementById("phone").value,
address: document.getElementById("address").value,
lat: document.getElementById("lat").value,
lon: document.getElementById("lon").value,
area: document.getElementById("area").value,
cane: document.getElementById("cane").value,
yield: document.getElementById("yield").value,
suggest: document.getElementById("suggest").value

};

fetch("save.php",{

method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(data)

})
.then(res=>res.json())
.then(res=>{
alert("บันทึกข้อมูลสำเร็จ")
})

}

</script>

</body>
</html>
